<style>.glow-primary {
    box-shadow: 0 0 15px rgba(157, 0, 255, 0.5)
    }
.glow-error {
    box-shadow: 0 0 15px rgba(255, 0, 60, 0.5)
    }
.bg-gradient-dark {
    background: linear-gradient(180deg, #16091b 0%, #000 100%)
    }
.glass-panel {
    background-color: rgba(18, 0, 33, 0.6);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(157, 0, 255, 0.2)
    }
.input-ghost {
    background: transparent !important;
    border: none;
    border-bottom: 2px solid #3e2f43;
    border-radius: 0;
    color: #dfb7ff;
    }
.input-ghost:focus {
    outline: none;
    border-bottom: 2px solid #9d00ff;
    box-shadow: 0 2px 10px rgba(157, 0, 255, 0.3)
    }
.chip-expense {
    color: #ffb4ab;
    background-color: rgba(255, 180, 171, 0.1);
    border: 1px solid #ffb4ab
    }
.chip-income {
    color: #dfb7ff;
    background-color: rgba(223, 183, 255, 0.1);
    border: 1px solid #dfb7ff
    }
/* Dashboard Background Blur */
.dashboard-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDfR690B3WWjor-rfgnwsDgOFyOolrNFdh4JC5EITj-uzaXfbSzVSpze7rjhVLbflUh0tmWf3TqKhJxwc3ZYbz_n3mz1GEb_dl5gKc1qKd3cXfCWSFlZkN-L8YfG8dkYLA0Awv5tNDLo2jbCEX7wt_1j6Pp4o0b95NFwxWl0im-8xkeXi-vewQFjk0WRqj5mB6Q36tUFf6Nuq9AI22yZqj_OM-sgClcpUQrJBMgrhFP7woMY2JEXGz2Vv2T_rzrOU6hVB8TBEkOIDc);
    background-size: cover;
    background-position: center
    }
.modal-overlay {
    background-color: rgba(22, 9, 27, 0.85);
    backdrop-filter: blur(8px)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-main antialiased h-screen overflow-hidden relative dashboard-bg" data-alt="A futuristic financial dashboard background blurred out. Deep midnight purple and neon violet hues dominate the abstract data visualization behind the modal overlay. Sharp, aggressive geometric lines and subtle grid patterns suggest high-performance analytics in a high-tech, gamer-centric environment.">
<!-- Modal Overlay -->
<div class="absolute inset-0 modal-overlay z-40 flex items-center justify-center px-container-margin py-container-margin md:py-12">
<!-- Modal Container (Glassmorphism) -->
<div class="glass-panel w-full max-w-2xl max-h-full overflow-y-auto flex flex-col relative">
<!-- Modal Header -->
<div class="sticky top-0 z-10 glass-panel border-b-0 border-x-0 border-t-0 border-b-2 border-primary/40 px-gutter py-stack-md flex justify-between items-center bg-surface/80 backdrop-blur-md">
<div class="flex items-center gap-stack-sm">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">add_box</span>
<h2 class="font-headline-md text-headline-md text-on-surface uppercase tracking-wider">Input Transaksi Baru</h2>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
</div>
<!-- Modal Content -->
<div class="p-gutter md:p-container-margin flex flex-col gap-stack-lg">
<!-- Transaction Type Toggle -->
<div class="flex w-full gap-stack-md">
<button class="flex-1 py-stack-sm flex items-center justify-center gap-2 border border-primary text-primary bg-primary/10 glow-primary transition-all">
<span class="material-symbols-outlined">arrow_downward</span>
<span class="font-label-caps text-label-caps">PENGELUARAN</span>
</button>
<button class="flex-1 py-stack-sm flex items-center justify-center gap-2 border border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-all">
<span class="material-symbols-outlined">arrow_upward</span>
<span class="font-label-caps text-label-caps">PEMASUKAN</span>
</button>
</div>
<!-- Amount Input -->
<div class="flex flex-col gap-unit relative">
<label class="font-label-caps text-label-caps text-on-surface-variant">JUMLAH (IDR)</label>
<div class="flex items-end">
<span class="font-currency-display text-currency-display text-primary mr-2 pb-1">Rp</span>
<input class="input-ghost w-full font-display-lg text-display-lg py-stack-sm text-primary" placeholder="0" style="caret-color: #dfb7ff;" type="text" value="250.000"/>
</div>
</div>
<!-- Categories Bento Grid -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-unit">KATEGORI</label>
<div class="grid grid-cols-2 md:grid-cols-3 gap-stack-sm">
<!-- Category Item 1 (Active Expense) -->
<div class="glass-panel p-stack-sm flex flex-col items-center justify-center gap-unit cursor-pointer border-error glow-error bg-error/10">
<span class="material-symbols-outlined text-error text-2xl">restaurant</span>
<span class="font-label-caps text-label-caps text-error text-center">Makanan &amp; Minuman</span>
</div>
<!-- Category Item 2 -->
<div class="glass-panel p-stack-sm flex flex-col items-center justify-center gap-unit cursor-pointer hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">directions_car</span>
<span class="font-label-caps text-label-caps text-on-surface-variant text-center">Transportasi</span>
</div>
<!-- Category Item 3 -->
<div class="glass-panel p-stack-sm flex flex-col items-center justify-center gap-unit cursor-pointer hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">shopping_bag</span>
<span class="font-label-caps text-label-caps text-on-surface-variant text-center">Belanja</span>
</div>
<!-- Category Item 4 -->
<div class="glass-panel p-stack-sm flex flex-col items-center justify-center gap-unit cursor-pointer hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">account_balance</span>
<span class="font-label-caps text-label-caps text-on-surface-variant text-center">Gaji / Pendapatan</span>
</div>
<!-- Category Item 5 -->
<div class="glass-panel p-stack-sm flex flex-col items-center justify-center gap-unit cursor-pointer hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">trending_up</span>
<span class="font-label-caps text-label-caps text-on-surface-variant text-center">Investasi</span>
</div>
<!-- Category Item 6 -->
<div class="glass-panel p-stack-sm flex flex-col items-center justify-center gap-unit cursor-pointer hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">group</span>
<span class="font-label-caps text-label-caps text-on-surface-variant text-center">Temen Ngutang</span>
</div>
</div>
</div>
<!-- Date & Note Inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant">TANGGAL</label>
<div class="flex items-center gap-2 border-b-2 border-surface-variant pb-2 focus-within:border-primary focus-within:shadow-[0_2px_10px_rgba(157,0,255,0.3)] transition-all">
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
<input class="bg-transparent border-none text-on-surface font-body-main text-body-main w-full focus:ring-0 p-0" type="text" value="24 Oktober 2023"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant">CATATAN (OPSIONAL)</label>
<div class="flex items-center gap-2 border-b-2 border-surface-variant pb-2 focus-within:border-primary focus-within:shadow-[0_2px_10px_rgba(157,0,255,0.3)] transition-all">
<span class="material-symbols-outlined text-on-surface-variant">edit_note</span>
<input class="bg-transparent border-none text-on-surface font-body-main text-body-main w-full focus:ring-0 p-0" placeholder="Makan siang tim" type="text"/>
</div>
</div>
</div>
</div>
<!-- Modal Footer Actions -->
<div class="mt-auto p-gutter md:p-container-margin border-t border-primary/20 bg-surface/40 flex flex-col md:flex-row gap-stack-md justify-between items-center">
<button class="w-full md:w-auto px-6 py-3 border border-outline-variant text-on-surface-variant hover:text-primary hover:border-primary transition-colors flex items-center justify-center gap-2 font-label-caps text-label-caps uppercase">
<span class="material-symbols-outlined">print</span>
                    Cetak Laporan
                </button>
<div class="flex w-full md:w-auto gap-stack-sm">
<button class="flex-1 md:flex-none px-6 py-3 border border-primary text-primary hover:bg-primary/10 transition-colors font-label-caps text-label-caps uppercase">Batal</button>
<button class="flex-1 md:flex-none px-8 py-3 bg-primary text-on-primary font-headline-md text-headline-md glow-primary hover:bg-primary-fixed transition-colors uppercase">SIMPAN DATA</button>
</div>
</div>
</div>
</div>
</body></html>
