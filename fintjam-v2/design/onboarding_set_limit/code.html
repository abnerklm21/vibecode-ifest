<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            box-shadow: 0 0 15px rgba(157, 0, 255, 0.5);

            box-shadow: 0 4px 15px rgba(157, 0, 255, 0.4);
        }

            width: 4px;

            background: #4e4356;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-container-margin relative overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Gradient Ambience -->
<div class="absolute inset-0 bg-gradient-to-br from-[#120021] via-background to-black z-0 pointer-events-none"></div>
<!-- Decorative Grid Overlay -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none" style="background-image: linear-gradient(rgba(157, 0, 255, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(157, 0, 255, 0.2) 1px, transparent 1px); background-size: 32px 32px;"></div>
<!-- Main Glass Card Container -->
<main class="relative z-10 w-full max-w-md bg-surface/60 backdrop-blur-[25px] border border-primary/20 p-8 shadow-[0_0_30px_rgba(223,183,255,0.05)] flex flex-col gap-stack-lg before:absolute before:top-0 before:left-0 before:w-full before:h-[2px] before:bg-primary-container before:shadow-[0_0_10px_#9d00ff]">
<!-- Header / Branding -->
<header class="flex flex-col gap-stack-sm mb-stack-md">
<h1 class="font-display-lg text-display-lg tracking-tighter text-primary uppercase">FINTJAM</h1>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[18px]">account_balance_wallet</span>
<span class="font-label-caps text-label-caps text-primary uppercase tracking-widest">Inisialisasi Sistem</span>
</div>
</header>
<!-- Content Area -->
<section class="flex flex-col gap-stack-md">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Limit Pengeluaran</h2>
<p class="font-body-main text-body-main text-on-surface-variant">Tentukan batas pengeluaran bulanan Anda. Parameter ini digunakan untuk mengkalibrasi peringatan sistem.</p>
</div>
<!-- Interactive Input Group -->
<div class="mt-stack-md relative group">
<label class="font-label-caps text-label-caps text-outline mb-unit block transition-colors group-focus-within:text-primary" for="monthly-limit">Alokasi Maksimum</label>
<div class="flex items-end gap-stack-sm relative">
<!-- Static Currency Prefix -->
<span class="font-currency-display text-currency-display text-primary pb-2 border-b-2 border-transparent">Rp</span>
<!-- Ghost Input -->
<input autocomplete="off" class="flex-1 w-full bg-transparent border-0 border-b-2 border-outline-variant text-on-surface font-currency-display text-[32px] md:text-display-lg focus:ring-0 focus:border-primary-container glow-input-focus transition-all duration-300 outline-none pb-1 px-0 placeholder-outline/30" id="monthly-limit" placeholder="0" type="text"/>
</div>
</div>
</section>
<!-- Action Area -->
<div class="mt-stack-lg pt-stack-md flex flex-col gap-stack-sm border-t border-outline-variant/30">
<div class="flex items-start gap-3 mb-stack-md">
<span class="material-symbols-outlined text-outline-variant text-[20px] mt-1">info</span>
<p class="font-label-caps text-label-caps text-outline-variant lowercase leading-relaxed">Limit dapat disesuaikan kembali melalui modul pengaturan setelah inisialisasi selesai.</p>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps py-4 px-6 uppercase tracking-widest glow-primary hover:bg-inverse-primary active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group">
                Mulai Pemantauan
                <span class="material-symbols-outlined text-[16px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
</body></html>
