<style>
        /* Essential utility for exact outer glow prescribed by brand */
        .neon-glow {
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.5);
        }
        .neon-glow-focus:focus {
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.5);
        }
        
        /* Enforce sharp edges everywhere */
        * {
            border-radius: 0 !important;
        }

        /* Glassmorphism background blur specific value */
        .glass-panel {
            background-color: rgba(18, 0, 33, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        /* Input specific focus transition */
        .ghost-input {
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-container-margin relative overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 pointer-events-none z-0">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-container/10 blur-[120px] rounded-full"></div>
</div>
<!-- Main Authentication Glass Card -->
<main class="glass-panel border border-primary/20 w-full max-w-[420px] p-stack-lg z-10 flex flex-col gap-stack-lg relative">
<!-- Subtle top accent line -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary-container to-transparent"></div>
<!-- Header / Brand -->
<header class="flex flex-col items-center justify-center text-center gap-stack-sm">
<h1 class="font-display-lg text-display-lg tracking-tighter text-primary uppercase leading-none drop-shadow-[0_0_10px_rgba(223,183,255,0.3)]">FINTJAM</h1>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Sistem Manajemen Finansial</p>
</header>
<!-- Navigation Tabs (Login / Register) -->
<nav class="flex w-full border-b border-outline-variant/50">
<button class="flex-1 pb-unit font-label-caps text-label-caps text-primary border-b-2 border-primary-container neon-glow-focus transition-all duration-300">
                MASUK
            </button>
<button class="flex-1 pb-unit font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-300">
                DAFTAR
            </button>
</nav>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md w-full">
<!-- Username Input -->
<div class="relative w-full group">
<div class="absolute inset-y-0 left-0 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="ghost-input w-full bg-transparent border-0 border-b-2 border-outline-variant pl-8 pr-0 py-2 font-body-main text-body-main text-on-surface placeholder:text-outline/50 focus:ring-0 focus:border-primary-container focus:outline-none" id="username" placeholder="Nama Pengguna" required="" type="text"/>
</div>
<!-- Password Input -->
<div class="relative w-full group mt-stack-sm">
<div class="absolute inset-y-0 left-0 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">key</span>
</div>
<input class="ghost-input w-full bg-transparent border-0 border-b-2 border-outline-variant pl-8 pr-10 py-2 font-body-main text-body-main text-on-surface placeholder:text-outline/50 focus:ring-0 focus:border-primary-container focus:outline-none" id="password" placeholder="Kata Sandi" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-unit">
<a class="font-label-caps text-label-caps text-primary/70 hover:text-primary transition-colors" href="#">Lupa Kata Sandi?</a>
</div>
<!-- Submit Action -->
<button class="mt-stack-md w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps py-4 px-6 border border-primary-container/50 neon-glow hover:bg-primary-container/90 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2" type="submit">
                OTORISASI AKSES
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- System Status Footer -->
<footer class="mt-stack-sm pt-stack-sm border-t border-outline-variant/30 flex justify-between items-center w-full">
<div class="flex items-center gap-2 text-on-surface-variant">
<div class="w-2 h-2 bg-[#00ff9d] rounded-full shadow-[0_0_8px_#00ff9d]"></div>
<span class="font-label-caps text-[10px] uppercase tracking-widest opacity-70">Sistem Online</span>
</div>
<span class="font-label-caps text-[10px] text-on-surface-variant opacity-50 uppercase">V 2.4.1</span>
</footer>
