<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FINTJAM</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 style="text-align: center; color: var(--primary-color);">FINTJAM</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">SYSTEM LOGIN INITIATED</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">USERNAME</label>
                    <input type="text" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">PASSWORD</label>
                    <input type="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-block">ACCESS SYSTEM</button>
            </form>

            <div class="auth-links">
                No account detected? <a href="register.html">REGISTER NOW</a>
            </div>
        </div>
    </div>
</body>

</html>
