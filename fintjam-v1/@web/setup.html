<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Limit - FINTJAM</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 style="text-align: center; color: var(--primary-color);">INITIAL SETUP</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">DEFINE YOUR MONTHLY EXPENDITURE LIMIT</p>
            
            <form id="setupForm">
                <div class="form-group">
                    <label class="form-label">MONTHLY LIMIT (IDR)</label>
                    <input type="number" id="setupLimit" class="form-control" placeholder="e.g. 5000000" required>
                    <small style="color: var(--text-secondary); display: block; margin-top: 0.5rem;">This limit will be used to warn you if expenses get too high.</small>
                </div>
                <button type="submit" class="btn btn-block">SAVE & ENTER SYSTEM</button>
            </form>
        </div>
    </div>

    <!-- Toast Alert Placeholder -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
</body>
</html>
