<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FINTJAM</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 style="text-align: center; color: var(--primary-color);">FINTJAM</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">CREATE NEW IDENTITY</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">USERNAME</label>
                    <input type="text" id="regUsername" class="form-control" placeholder="Choose a unique username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">PASSWORD</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Set a secure password" required>
                </div>
                <div class="form-group">
                    <label class="form-label">CONFIRM PASSWORD</label>
                    <input type="password" id="regConfirmPassword" class="form-control" placeholder="Verify your password" required>
                </div>
                <button type="submit" class="btn btn-block">INITIALIZE PROFILE</button>
            </form>
            
            <div class="auth-links">
                Identity already exists? <a href="login.html">LOGIN HERE</a>
            </div>
        </div>
    </div>

    <!-- Toast Alert Placeholder -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
</body>
</html>
